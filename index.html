```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NoteHub AI</title>

<style>
body{
font-family:Arial,sans-serif;

transition:0.3s;
}

.container{

box-shadow:0 2px 10px rgba(0,0,0,.1);
}

textarea{
width:100%;

}

button{
background:#2563eb;

}

button:hover{

}

#answer{

}
#history{

}

.dark #history{
background:#2a2a2a;

}

/* DARK MODE */

color:white;
}

.dark .container{
background:#1e1e1e;
color:white;
}

.dark textarea{
background:#2a2a2a;
color:white;
border:1px solid #555;
}

.dark #answer{
background:#2a2a2a;
color:white;
}

.dark p,
.dark h1,
.dark h2,
.dark h3{
color:white;
}
  .app{
display:flex;
gap:15px;
min-height:100vh;
}

.sidebar{
width:260px;
background:#1e293b;

}

.main{
flex:1;
}

#history div{
padding:10px;

}

background:#475569;
}
</style>

</head>

<body>

<div class="app">

<div class="sidebar">

<h2>📚 NoteHub AI</h2>

<button id="newChatBtn">➕ New Chat</button>

<h3>📜 Chats</h3>

<div id="history"></div>

</div>

<div class="main">

<div class="container">

<h1>🤖 NoteHub AI v2.1 🚀</h1>

<button onclick="toggleDarkMode()">🌙 Dark Mode</button>

<p>Your personal study companion for academic learning.</p>

<p>Ask study questions, get explanations, and generate summaries.</p>

<textarea id="question" placeholder="Ask a question..."></textarea>

<br><br>

<button onclick="askAI()">Ask AI</button>

<button onclick="copyAnswer()">📋 Copy Answer</button>

<div id="answer">
AI connection is being configured...
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>

document.getElementById("question").addEventListener("keydown", function(e) {
if (e.key === "Enter" && !e.shiftKey) {
e.preventDefault();
askAI();
}
});

function copyAnswer() {
const text = document.getElementById("answer").innerText;
navigator.clipboard.writeText(text);
alert("Answer copied!");
}

function toggleDarkMode() {
document.body.classList.toggle("dark");
}
  document.addEventListener("DOMContentLoaded", () => {

const btn = document.getElementById("newChatBtn");

if(btn){
btn.addEventListener("click", () => {

document.getElementById("question").value = "";

document.getElementById("answer").innerHTML =
"🤖 New Chat Started";

});
}

});

window.onload = function(){

function renderHistory(){

const history =
JSON.parse(localStorage.getItem("notehub_history")) || [];

document.getElementById("history").innerHTML =
history.map((item,index)=>
`<div onclick="openChat(${index})">
${item.question}
</div>`
).join("");

}
  
const history =
JSON.parse(localStorage.getItem("notehub_history")) || [];

renderHistory();

function openChat(index){

const history =
JSON.parse(localStorage.getItem("notehub_history")) || [];

const chat = history[index];

document.getElementById("question").value =
chat.question;

document.getElementById("answer").innerHTML =
chat.answer;

}
};

async function askAI() {
let history =
JSON.parse(localStorage.getItem("notehub_history")) || [];
const question = document.getElementById("question").value;

if (!question) {
alert("Please enter a question");
return;
}

document.getElementById("answer").innerHTML =
"<h3>🤖 Thinking...</h3><p>Please wait while AI prepares your answer.</p>";

try {

const response = await fetch("/api/chat", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ question })
});

const data = await response.json();

document.getElementById("answer").innerHTML =
marked.parse(
data.answer ||
data.error ||
"No response received."
);

history.unshift({
question: question,
answer: marked.parse(
data.answer ||
data.error ||
"No response received."
)
});

if(history.length > 5){
history.pop();
}

localStorage.setItem(
"notehub_history",
JSON.stringify(history)
);

renderHistory();

} catch (error) {

document.getElementById("answer").innerHTML =
"<b>❌ Error connecting to AI.</b>";

}

}

</script>

</body>
</html>
