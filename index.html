<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NoteHub AI</title>
<style>
body{
font-family:Arial,sans-serif;
max-width:900px;
margin:auto;
padding:20px;
background:#f5f7fb;
}
.container{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}
textarea{
width:100%;
height:120px;
padding:10px;
}
button{
background:#2563eb;
color:white;
border:none;
padding:12px 24px;
border-radius:8px;
cursor:pointer;
font-size:16px;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:#1d4ed8;
}
#answer{
margin-top:20px;
padding:20px;
background:#eef4ff;
border-radius:10px;
line-height:1.6;
font-size:16px;
white-space:normal;
overflow-wrap:break-word;
}
</style>
</head>
<body>

<div class="container">
<h1>🤖 NoteHub AI</h1>

<p>Ask study questions, get explanations, and generate summaries.</p>

<textarea id="question" placeholder="Ask a question..."></textarea>

<br><br>

<button onclick="askAI()">Ask AI</button>

<div id="answer">
AI connection is being configured...
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
document.getElementById("question").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    askAI();
  }
});
<script>
async function askAI() {
  const question = document.getElementById("question").value;

  if (!question) {
    alert("Please enter a question");
    return;
  }

  document.getElementById("answer").innerHTML =
"<h3>🤖 Thinking...</h3><p>Please wait while AI prepares your answer.</p>";
  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ question }),
    });

    const data = await response.json();

    document.getElementById("answer").innerHTML =
      marked.parse(
        data.answer ||
        data.error ||
        "No response"
      );

  } catch (error) {
    document.getElementById("answer").innerHTML =
      "<b>❌ Error connecting to AI.</b>";
  }
}
</script>

</body>
</html>
