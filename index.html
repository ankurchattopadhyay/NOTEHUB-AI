<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NoteHub AI</title>
<style>
body{
font-family:Arial,sans-serif;
max-width:900px;
margin:auto;
padding:20px;
background:#f5f7fb;
}
.container{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}
textarea{
width:100%;
height:120px;
padding:10px;
}
button{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
}
#answer{
margin-top:20px;
padding:15px;
background:#eef4ff;
border-radius:8px;
}
</style>
</head>
<body>

<div class="container">
<h1>🤖 NoteHub AI</h1>

<p>Ask study questions, get explanations, and generate summaries.</p>

<textarea id="question" placeholder="Ask a question..."></textarea>

<br><br>

<button onclick="askAI()">Ask AI</button>

<div id="answer">
AI connection is being configured...
</div>
</div>

<script>
async function askAI() {
const q = document.getElementById("question").value;

if(!q){
alert("Please enter a question");
return;
}

document.getElementById("answer").innerHTML =
"AI backend setup in progress. Soon NoteHub AI will answer your questions automatically.";
}
</script>

</body>
</html>
