<script>
let currentChat = [];
let activeChatIndex = -1;
let currentUser = null;
  
document.getElementById("question").addEventListener("keydown", function(e) {
if (e.key === "Enter" && !e.shiftKey) {
e.preventDefault();
askAI();
}
});

localStorage.removeItem("notehub_history");

}
 async function loadCloudHistory(){

);

console.log("Cloud Chat Deleted");

}catch(err){

}

}

if(!currentUser) return;

}
);

}

async function loadCloudHistory(){

if(!currentUser) return;

try{

const q = query(
collection(db,"chats"),
where("uid","==",currentUser.uid)
);

const snapshot = await getDocs(q);

let cloudHistory = [];

snapshot.forEach((doc)=>{

cloudHistory.push({
question: doc.data().question,
answer: doc.data().answer
});

});

localStorage.setItem(

);

);

  document.addEventListener("DOMContentLoaded", () => {

const btn = document.getElementById("newChatBtn");

if(btn){
btn..addEventListener("click",async ()=>{
currentChat = [];
document.getElementById("question").value = "";

document.getElementById("chatArea").innerHTML =
'<div class="ai-message">🤖 New Chat Started</div>';
  
});
}

});

function renderHistory(){

const history =
JSON.parse(localStorage.getItem("notehub_history")) || [];

const search =
document.getElementById("searchChat")?.value?.toLowerCase() || "";

document.getElementById("history").innerHTML =
history
.filter(item =>
item.question.toLowerCase().includes(search)
)
.map((item,index)=>
`<div onclick="openChat(${index})">
${item.question}
</div>`
)
.join("");

}

function openChat(index){
  
activeChatIndex = index;
renderHistory();
const history =
JSON.parse(localStorage.getItem("notehub_history")) || [];

const chat = history[index];

document.getElementById("question").value =
chat.question;

document.getElementById("chatArea").innerHTML =
chat.answer;

currentChat =
chat.messages || [];
}

window.onload = function(){

renderHistory();

onAuthStateChanged(auth,(user)=>{

if(user){

currentUser = user;
loadCloudHistory();
document.getElementById("userName").innerHTML =
"👤 " + user.displayName;

document.getElementById("loginBtn").style.display =
"none";

document.getElementById("logoutBtn").style.display =
"block";

}else{

currentUser = null;

document.getElementById("userName").innerHTML =
"";

document.getElementById("loginBtn").style.display =
"block";

document.getElementById("logoutBtn").style.display =
"none";

}

});
  
document
.getElementById("searchChat")
.addEventListener("input", renderHistory);

document
.getElementById("loginBtn")
.addEventListener("click", loginGoogle);

document
.getElementById("logoutBtn")
.addEventListener("click", logoutGoogle);

};

document
.getElementById("deleteChatBtn")
.addEventListener("click",()=>{

if(activeChatIndex===-1){
alert("Select a chat first");
return;
}

let history =
JSON.parse(
localStorage.getItem("notehub_history")
) || [];
if(history[activeChatIndex].id){

await deleteChatFromCloud(
history[activeChatIndex].id
);

}
history.splice(activeChatIndex,1);

localStorage.setItem(
"notehub_history",
JSON.stringify(history)
);

activeChatIndex=-1;

renderHistory();

document.getElementById("chatArea").innerHTML =
'<div class="ai-message">🤖 Chat Deleted</div>';

});
  
async function askAI() {

if(!currentUser){
alert("Please login first");
return;
}
  
let history =
JSON.parse(localStorage.getItem("notehub_history")) || [];
const question = document.getElementById("question").value;

currentChat.push({
role:"user",
content:question
});
  
if (!question) {
alert("Please enter a question");
return;
}

const chatArea =
document.getElementById("chatArea");

chatArea.innerHTML += `
<div class="user-message">
👤 ${question}
</div>
`;

chatArea.innerHTML += `
<div class="ai-message" id="thinking">
🤖 Thinking...
<br>
Preparing your answer...
<br>
⏳
</div>
`;

try {

const response = await fetch("/api/chat", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ question })
});

const data = await response.json();

document.getElementById("thinking").remove();

chatArea.innerHTML += `
<div class="ai-message">
🤖 ${marked.parse(
data.answer ||
data.error ||
"No response received."
)}
</div>
`;

currentChat.push({
role:"assistant",
content:data.answer
});
  await saveChatToCloud(
question,
data.answer
);
  
chatArea.scrollTop =
chatArea.scrollHeight;

history.unshift({
question: currentChat[0].content,
answer: chatArea.innerHTML,
messages: currentChat
});

if(history.length > 5){
history.pop();
}

localStorage.setItem(
"notehub_history",
JSON.stringify(history)
);

renderHistory();

} catch (error) {

chatArea.innerHTML += `
<div class="ai-message">
❌ Error connecting to AI
</div>
`;
}

}

</script>
